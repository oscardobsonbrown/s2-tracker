name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER)"
template: |
  ## Changes

  $CHANGES

version-resolver:
  major:
    labels: ["major"]
  minor:
    labels: ["minor", "feature"]
  patch:
    labels: ["patch", "fix", "chore"]
  default: patch
